<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Forex Quiz</title>
    <link rel="stylesheet" href="bootstrap.min.css">
  </head>
  <body>

    <!-- Top Section -->
    <div class="intro py-3 bg-white text-center">
      <div class="container">
        <h2 class="text-primary display-3 my-4">Forex Quiz</h2>
      </div>
    </div>

    <div class="result py-4 d-none bg-light text-center">
      <div class="container lead">
        <p>You are <span class="text-primary display-4 p-3">0%</span>Trader</p>
      </div>
    </div>

    <!-- Questions Section -->
    <div class="quiz py-4 bg-primary">
      <div class="container">
        <h2 class="my-5 text-white">On with the questions...</h2>
        <form class="quiz-form text-light">
          <div class="my-5">
            <p class="lead font-weight-normal">1. What is Forex?</p>
            <div class="form-check my-2 text-white-50">
              <input type="radio" name="q1" value="A">
              <label class="form-check-label">Goods we buy from other countries.</label>
            </div>
            <div class="form-check my-2 text-white-50">
              <input type="radio" name="q1" value="B">
              <label class="form-check-label">Buying and selling of currences.</label>
            </div>
          </div>
          <div class="my-5">
            <p class="lead font-weight-normal">2. What are G7 Currencies?</p>
            <div class="form-check my-2 text-white-50">
              <input type="radio" name="q2" value="A">
              <label class="form-check-label">Currencies from developing countries.</label>
            </div>
            <div class="form-check my-2 text-white-50">
              <input type="radio" name="q2" value="B">
              <label class="form-check-label">Currencies from developed countries.</label>
            </div>
          </div>
          <div class="my-5">
            <p class="lead font-weight-normal">3. What is Volatility?</p>
            <div class="form-check my-2 text-white-50">
              <input type="radio" name="q3" value="A" checked>
              <label class="form-check-label">Variation of currency price over time.</label>
            </div>
            <div class="form-check my-2 text-white-50">
              <input type="radio" name="q3" value="B">
              <label class="form-check-label">Loss of currency strength over time.</label>
            </div>
          </div>
          <div class="my-5">
            <p class="lead font-weight-normal">4. What is a pip?</p>
            <div class="form-check my-2 text-white-50">
              <input type="radio" name="q4" value="A" checked>
              <label class="form-check-label">Smallest unit of currency price.</label>
            </div>
            <div class="form-check my-2 text-white-50">
              <input type="radio" name="q4" value="B">
              <label class="form-check-label">Price in price.</label>
            </div>
          </div>
          <div class="my-5">
            <p class="lead font-weight-normal">5. Which of the following is a trading style?</p>
            <div class="form-check my-2 text-white-50">
              <input type="radio" name="q5" value="A" checked>
              <label class="form-check-label">Swing</label>
            </div>
            <div class="form-check my-2 text-white-50">
              <input type="radio" name="q5" value="B">
              <label class="form-check-label">Short</label>
            </div>
          </div>
          <div class="text-center">
            <input type="submit" class="btn btn-light">
          </div>
        </form>
        </div>
      </div>
    </div>


    <script src="script.js"></script>
  </body>
</html>
